version: '3.8'

services:
  # NeteaseCloudMusic API
  ncm-api:
    image: binaryify/netease_cloud_music_api
    container_name: claudio-ncm
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Claudio Main Service
  claudio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudio-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NCM_API_URL=http://ncm-api:3000
    volumes:
      - ./data:/app/data
      - ./user:/app/user:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      - ncm-api
    restart: unless-stopped
