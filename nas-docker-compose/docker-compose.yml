version: '3.8'

services:
  ncm-api:
    # 使用 Enhanced 社区维护版（基于本地 Dockerfile 构建）
    build:
      context: .
      dockerfile: Dockerfile
    image: flowstate-radio-ncm-enhanced:latest
    container_name: flowstate-radio-ncm
    ports:
      - "3761:3000"
    restart: unless-stopped
    environment:
      - MUSIC_U=your_netease_music_u_token_here
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
